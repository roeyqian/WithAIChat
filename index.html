<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Social Practice Demo</title>
  <link rel="stylesheet" href="./index.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <h1 id="appTitle">AI Chat Practice</h1>
        <p id="scenarioGoal" class="muted"></p>
      </div>
      <div class="top-actions">
        <button id="setKeyBtn" type="button">Set / Change DeepSeek Key</button>
        <button id="backHomeBtn" type="button" class="hidden">Back Home</button>
        <button id="resetLevelBtn" type="button" class="hidden">Reset Level</button>
        <button id="nextLevelBtn" type="button" class="hidden">Next Level</button>
      </div>
    </header>

    <section id="homeView" class="card home-view">
      <h2 id="homeTitle">Start Practice</h2>
      <p id="homeDesc" class="muted"></p>
      <div class="home-controls">
        <label for="languageSelect" id="languageLabel">Language</label>
        <select id="languageSelect">
          <option value="zh">中文</option>
          <option value="en" selected>English</option>
          <option value="ja">日本語</option>
        </select>
      </div>
      <div id="levelButtons" class="level-buttons"></div>
    </section>

    <main id="gameView" class="main-layout hidden">
      <section class="left-panel card">
        <h2 id="statusTitle">Level Status</h2>
        <p><strong id="currentLevelText">Current level:</strong><span id="levelLabel"></span></p>
        <p><strong id="roundText">Round:</strong><span id="roundLabel"></span></p>
        <p><strong id="keyStatusText">API Key:</strong><span id="keyStatus"></span></p>
        <p id="coachHint" class="muted">Reduce impulsivity, show calm analysis, and respond with perspective-taking.</p>
      </section>

      <section class="chat-panel card">
        <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
        <form id="composerForm" class="composer">
          <label for="chatInput" id="chatInputLabel" class="sr-only">Chat input</label>
          <input id="chatInput" type="text" maxlength="500" placeholder="Type your reply and guide your friends toward more rational and empathetic choices..." aria-label="Chat input" required />
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </section>

      <section class="right-panel card">
        <h2 id="scoreTitle">Live Score</h2>
        <div class="score-grid">
          <div class="score-item">
            <span id="scoreImpulseText">Non-impulsive</span>
            <strong id="scoreImpulse">-</strong>
          </div>
          <div class="score-item">
            <span id="scoreCalmText">Calm analysis</span>
            <strong id="scoreCalm">-</strong>
          </div>
          <div class="score-item">
            <span id="scoreEmpathyText">Perspective-taking</span>
            <strong id="scoreEmpathy">-</strong>
          </div>
          <div class="score-item total">
            <span id="scoreTotalText">Overall</span>
            <strong id="scoreTotal">-</strong>
          </div>
        </div>
        <p id="scoreReason" class="muted"></p>
        <hr />
        <p><strong id="levelAverageText">Level average:</strong><span id="levelAverage">-</span></p>
      </section>
    </main>
  </div>
  <script src="./index.js"></script>
</body>
</html>
